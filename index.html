<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rental Kit Builder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; font-size: 14px; }
  .header { background: #1a2a3a; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 600; }

  /* Kit type selector */
  .kit-selector { background: #fff; border-bottom: 1px solid #e0e4ea; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  .kit-selector label { font-size: 13px; font-weight: 600; color: #555; margin-right: 4px; }
  .kit-btn { padding: 7px 18px; border: 2px solid #d0d5dd; border-radius: 6px; background: #fff; font-size: 13px; font-weight: 500; cursor: pointer; color: #555; transition: all 0.15s; }
  .kit-btn.active { border-color: #1a2a3a; background: #1a2a3a; color: #fff; }
  .kit-btn:hover:not(.active) { border-color: #a0b0c0; }

  .layout { display: grid; grid-template-columns: 1fr 340px; gap: 16px; max-width: 1200px; margin: 0 auto; padding: 16px; }
  @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } }

  .steps { display: flex; flex-direction: column; gap: 12px; }
  .step { background: #fff; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); padding: 14px 16px; }
  .step-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .step-num { background: #1a2a3a; color: #fff; width: 22px; height: 22px; border-radius: 50%; text-align: center; line-height: 22px; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .step-title { font-size: 14px; font-weight: 600; }
  .step-badge { font-size: 10px; color: #888; background: #f0f2f5; padding: 2px 7px; border-radius: 10px; margin-left: 6px; }
  .step-desc { font-size: 11px; color: #888; margin-left: auto; }

  .step select { width: 100%; padding: 8px 10px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 13px; background: #fff; color: #333; cursor: pointer; }
  .step select:focus { outline: none; border-color: #2a7ae2; }

  .filter-input { width: 100%; padding: 6px 10px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 12px; margin-bottom: 6px; }
  .filter-input:focus { outline: none; border-color: #2a7ae2; }
  .check-list { max-height: 180px; overflow-y: auto; border: 1px solid #e8eaed; border-radius: 6px; }
  .check-item { display: flex; align-items: center; gap: 8px; padding: 5px 10px; cursor: pointer; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
  .check-item:last-child { border-bottom: none; }
  .check-item:hover { background: #f8fafc; }
  .check-item input { margin: 0; cursor: pointer; flex-shrink: 0; }
  .check-item .ci-part { font-family: 'SF Mono', Consolas, monospace; font-weight: 600; min-width: 72px; font-size: 12px; color: #1a2a3a; }
  .check-item .ci-desc { color: #555; flex: 1; }
  .check-item .ci-qty { margin-left: auto; display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .check-item .ci-qty button { width: 20px; height: 20px; border: 1px solid #ccc; border-radius: 3px; background: #f9f9f9; cursor: pointer; font-size: 12px; line-height: 1; padding: 0; }
  .check-item .ci-qty button:hover { background: #e9e9e9; }
  .check-item .ci-qty span { font-size: 12px; min-width: 16px; text-align: center; }

  /* Summary */
  .summary { background: #fff; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); padding: 16px; position: sticky; top: 16px; align-self: start; }
  .summary h2 { font-size: 15px; margin-bottom: 4px; }
  .summary .count { font-size: 11px; color: #888; margin-bottom: 12px; }
  .summary-empty { color: #999; font-size: 13px; padding: 20px 0; text-align: center; }
  .summary-list { list-style: none; }
  .summary-list li { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
  .summary-list li:last-child { border-bottom: none; }
  .summary-list .sl-part { font-family: 'SF Mono', Consolas, monospace; font-weight: 600; font-size: 12px; flex-shrink: 0; }
  .summary-list .sl-desc { color: #666; flex: 1; font-size: 12px; line-height: 1.4; }
  .summary-list .sl-qty { color: #888; font-size: 11px; flex-shrink: 0; }
  .summary-cat { font-size: 10px; text-transform: uppercase; color: #aaa; letter-spacing: 0.5px; padding-top: 10px; padding-bottom: 2px; font-weight: 600; }
  .summary-cat:first-child { padding-top: 0; }

  .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .btn { padding: 7px 14px; border: none; border-radius: 5px; font-size: 12px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn-primary { background: #2a7ae2; color: #fff; }
  .btn-primary:hover { background: #1a6ad2; }
  .btn-secondary { background: #e8ecf0; color: #333; }
  .btn-secondary:hover { background: #d8dce0; }
  .btn-danger { background: #fff; color: #d44; border: 1px solid #dcc; font-size: 11px; padding: 5px 10px; }
  .btn-danger:hover { background: #fef0f0; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: #1a2a3a; color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 10; }
  .toast.show { opacity: 1; }

  .no-kit { text-align: center; padding: 60px 20px; color: #aaa; }
  .no-kit p { font-size: 15px; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>Kit Builder</h1>
  <button class="btn btn-danger" onclick="clearAll()">Clear All</button>
</div>

<div class="kit-selector">
  <label>Kit Type:</label>
  <button class="kit-btn" id="btn-rental" onclick="setKit('rental')">Rental Kit</button>
  <button class="kit-btn" id="btn-evalPro" onclick="setKit('evalPro')">E-Val Pro Kit</button>
</div>

<div class="layout">
  <div class="steps" id="steps">
    <div class="no-kit"><p>Select a kit type above to get started.</p></div>
  </div>

    <h2>Kit Summary</h2>
    <div class="count" id="summary-count">0 items</div>
    <div id="summary-content"><p class="summary-empty">Select a kit type to begin.</p></div>

<div class="toast" id="toast"></div>

// ============================================================
// APP STATE & LOGIC
// ============================================================
let currentKit = null;
const state = {};

function setKit(kit) {
  if (currentKit === kit) return;
  currentKit = kit;
  Object.keys(state).forEach(k => delete state[k]);
  document.getElementById('btn-rental').classList.toggle('active', kit === 'rental');
  document.getElementById('btn-evalPro').classList.toggle('active', kit === 'evalPro');
  renderSteps();
  renderSummary();
}

function renderSteps() {
  const stepsEl = document.getElementById('steps');
  stepsEl.innerHTML = '';
  const steps = KIT_STEPS[currentKit] || [];

  steps.forEach((step, i) => {
    const div = document.createElement('div');
    div.className = 'step';
    let bodyHTML = '';

    if (step.type === 'dropdown') {
      bodyHTML = `<select data-step="${step.id}" onchange="handleDropdown(this)">
        <option value="">â Select â</option>
        ${step.options.map(o => `<option value="${o.part}" data-desc="${o.desc}">${o.part} â ${o.desc}</option>`).join('')}
      </select>`;
    } else {
      bodyHTML = `
        <input type="text" class="filter-input" placeholder="Search..." oninput="filterList('${step.id}', this.value)">
        <div class="check-list" id="list-${step.id}">
          ${step.options.map((o, idx) => `
            <label class="check-item" data-search="${(o.part + ' ' + o.desc).toLowerCase()}">
              <input type="checkbox" data-step="${step.id}" data-part="${o.part}" data-idx="${idx}" onchange="handleCheck(this)">
              <span class="ci-part">${o.part}</span>
              <span class="ci-desc">${o.desc}</span>
              <span class="ci-qty">
                <button onclick="event.preventDefault();changeQty('${step.id}','${o.part}',${idx},-1)">â</button>
                <span id="qty-${step.id}-${idx}">1</span>
                <button onclick="event.preventDefault();changeQty('${step.id}','${o.part}',${idx},1)">+</button>
              </span>
            </label>`).join('')}
        </div>`;
    }

    div.innerHTML = `
      <div class="step-header">
        <span class="step-num">${i + 1}</span>
        <span class="step-title">${step.title}</span>
        ${step.badge ? `<span class="step-badge">${step.badge}</span>` : ''}
        <span class="step-desc">${step.description}</span>
      </div>
      ${bodyHTML}`;
    stepsEl.appendChild(div);
  });
}

function handleDropdown(el) {
  const s = el.dataset.step;
  state[s] = {};
  if (el.value) state[s][el.value + '_0'] = { part: el.value, desc: el.selectedOptions[0]?.dataset.desc || '', qty: 1 };
  renderSummary();
}

function handleCheck(el) {
  const s = el.dataset.step, p = el.dataset.part, idx = el.dataset.idx;
  const key = p + '_' + idx;
  if (!state[s]) state[s] = {};
  if (el.checked) {
    const qtyEl = document.getElementById(`qty-${s}-${idx}`);
    const step = KIT_STEPS[currentKit].find(x => x.id === s);
    const opt = step.options[idx];
    state[s][key] = { part: p, desc: opt.desc, qty: parseInt(qtyEl.textContent) || 1 };
  } else {
    delete state[s][key];
  }
  renderSummary();
}

function changeQty(s, p, idx, delta) {
  const qtyEl = document.getElementById(`qty-${s}-${idx}`);
  let v = Math.max(1, (parseInt(qtyEl.textContent) || 1) + delta);
  qtyEl.textContent = v;
  const key = p + '_' + idx;
  if (state[s] && state[s][key]) { state[s][key].qty = v; renderSummary(); }
}

function filterList(s, q) {
  const l = q.toLowerCase();
  document.querySelectorAll(`#list-${s} .check-item`).forEach(item => {
    item.style.display = item.dataset.search.includes(l) ? '' : 'none';
  });
}

function getSelectedParts() {
  const parts = [];
  if (!currentKit) return parts;
  KIT_STEPS[currentKit].forEach(step => {
    if (!state[step.id]) return;
    Object.values(state[step.id]).forEach(item => {
      parts.push({ category: step.title, part: item.part, desc: item.desc, qty: item.qty });
    });
  });
  return parts;
}

function renderSummary() {
  const parts = getSelectedParts();
  const content = document.getElementById('summary-content');
  const countEl = document.getElementById('summary-count');
  const totalQty = parts.reduce((s, p) => s + p.qty, 0);
  countEl.textContent = `${parts.length} line item${parts.length !== 1 ? 's' : ''} Â· ${totalQty} total qty`;

  if (!currentKit) { content.innerHTML = '<p class="summary-empty">Select a kit type to begin.</p>'; return; }
  if (parts.length === 0) { content.innerHTML = '<p class="summary-empty">Select options to build your kit.</p>'; return; }

  let html = '<ul class="summary-list">', lastCat = '';
  parts.forEach(p => {
    if (p.category !== lastCat) { html += `<li class="summary-cat">${p.category}</li>`; lastCat = p.category; }
    html += `<li>
      <span class="sl-part">${p.part}</span>
      <span class="sl-desc">${p.desc}</span>
      ${p.qty > 1 ? `<span class="sl-qty">x${p.qty}</span>` : ''}
    </li>`;
  });
  html += '</ul>';
  html += `<div class="actions">
    <button class="btn btn-primary" onclick="copyToClipboard()">Copy</button>
    <button class="btn btn-secondary" onclick="exportCSV()">CSV</button>
  </div>`;
  content.innerHTML = html;
}

function copyToClipboard() {
  const parts = getSelectedParts();
  const text = parts.map(p => `${p.part}\t${p.desc}\t${p.qty}`).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'));
}

function exportCSV() {
  const parts = getSelectedParts();
  let csv = 'Part Number,Description,Qty,Category\n';
  parts.forEach(p => csv += `${p.part},"${p.desc}",${p.qty},"${p.category}"\n`);
  const b = new Blob([csv], { type: 'text/csv' }), a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = 'kit.csv'; a.click();
  showToast('CSV downloaded!');
}

function clearAll() {
  Object.keys(state).forEach(k => delete state[k]);
  document.querySelectorAll('select').forEach(e => e.selectedIndex = 0);
  document.querySelectorAll('input[type="checkbox"]').forEach(e => e.checked = false);
  document.querySelectorAll('[id^="qty-"]').forEach(e => e.textContent = '1');
  renderSummary();
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
